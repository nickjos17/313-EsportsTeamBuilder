<header class="main-taskbar">
  <div class="brand">
    <span class="logo">ESPORTS</span> BUILDER
  </div>
  
  <nav class="nav-links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
    <a routerLink="/players" routerLinkActive="active">Players</a>
    <a routerLink="/rosters" routerLinkActive="active">Rosters</a>
  </nav>

  <div class="auth-section">
    @if (auth.user$ | async; as user) {
      <div class="user-info">
        <span class="user-email">{{ user.email }}</span>
        <button (click)="logout()" class="logout-btn">Sign Out</button>
      </div>
    } @else {
      <a routerLink="/login" class="login-btn">Log In</a>
    }
  </div>
</header>

<router-outlet></router-outlet>
