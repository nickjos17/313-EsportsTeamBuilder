<div class="search-container">
  <input 
    type="text" 
    placeholder="Search by name or role (e.g. Tank)..." 
    [(ngModel)]="searchTerm" 
    (input)="filterPlayers()"
  />
</div>

<div class="player-grid">
  @for (p of filteredPlayers; track p.id) {
    <app-player-card [player]="p"></app-player-card>
  } @empty {
    <p>No players found matching "{{searchTerm}}"</p>
  }
</div>
